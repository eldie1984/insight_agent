name: CI/CD Pipeline

on:
  push:
    branches: [ "main" , 'hotfix/**' ]

env:
  PROJECT_ID: gentle-habitat-499210-h9
  REGION: us-central1 
  GAR_LOCATION: us-central1-docker.pkg.dev
  REPOSITORY: ml-models
  IMAGE_NAME: forecast-asistant
  SERVICE_NAME: forecast-asistant

jobs:
  # 1. RUN TESTS 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # FIX: Bumped to latest version for modern Node environments
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1 
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        # FIX: Removed the 'if' condition so broken cached venvs can be dynamically repaired by Poetry
        run: poetry install --no-interaction

  # 2. BUILD & PUSH DOCKER IMAGE
  # 2. BUILD & PUSH DOCKER IMAGE
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1098523474218/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'taligent-test@gentle-habitat-499210-h9.iam.gserviceaccount.com'
          # FIX: Explicitly request an access token output for Docker login
          token_format: 'access_token'

      - name: Reset Docker Credential Helpers
        run: |
          rm -f ~/.docker/config.json
          gcloud config unset auth/impersonate_service_account || true

      - name: Docker Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. DEPLOY TO CLOUD RUN
  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1098523474218/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'taligent-test@gentle-habitat-499210-h9.iam.gserviceaccount.com'

      - name: Deploy to Cloud Run
        id: deploy-cloud-run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --memory=2Gi
            --cpu=2
            --max-instances=10
            --timeout=300

      # 5. HEALTH CHECK
      # 5. HEALTH CHECK
      - name: Verify Service Health
        run: |
          URL="${{ steps.deploy-cloud-run.outputs.url }}/health"
          echo "Checking health at $URL"
          
          # Fetch a token for the authenticated service account
          TOKEN=$(gcloud auth print-identity-token)
          
          for i in {1..5}; do
            # Securely authenticate the curl request using the token
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" $URL)
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check returned $STATUS. Retrying in 5 seconds..."
            sleep 5
          done
          echo "Health check failed!" && exit 1

  # 6. SLACK NOTIFICATION
  notify:
    # FIX: Depend ONLY on the last step in your tree. If 'deploy' finishes, the other needs finished too.
    needs: [deploy] 
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine Workflow Status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "conclusion=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "conclusion=failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          # ADD THESE TWO LINES RIGHT HERE:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          
          payload: >
            {
              "text": "CI/CD Pipeline Execution Status Update",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "title": "CI/CD Pipeline: ${{ steps.status.outputs.conclusion }}",
                  "text": "Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}",
                  "actions": [
                    {
                      "type": "button",
                      "text": "View Workflow Run",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }